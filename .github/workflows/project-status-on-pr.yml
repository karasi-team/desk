name: Update Project Status From PR

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Update linked issue status in project
        uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ vars.KARASI_PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.KARASI_PROJECT_STATUS_FIELD_ID }}
          STATUS_OPTION_IN_REVIEW_ID: ${{ vars.KARASI_STATUS_IN_REVIEW_OPTION_ID }}
          STATUS_OPTION_DONE_ID: ${{ vars.KARASI_STATUS_DONE_OPTION_ID }}
        with:
          github-token: ${{ secrets.KARASI_PROJECT_PAT }}
          script: |
            const body = context.payload.pull_request.body || "";
            const issueNumbers = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)].map(m => Number(m[1]));
            if (issueNumbers.length === 0) {
              core.info("No linked issues with closing keywords found in PR body.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const optionId = context.payload.action === "closed" && context.payload.pull_request.merged
              ? process.env.STATUS_OPTION_DONE_ID
              : process.env.STATUS_OPTION_IN_REVIEW_ID;

            for (const issueNumber of issueNumbers) {
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              const issueNodeId = issue.data.node_id;

              const items = await github.graphql(
                `query($project: ID!, $issue: ID!) {
                  node(id: $project) {
                    ... on ProjectV2 {
                      items(first: 100, filterBy: { contentId: $issue }) {
                        nodes { id }
                      }
                    }
                  }
                }`,
                { project: process.env.PROJECT_ID, issue: issueNodeId }
              );

              const item = items.node.items.nodes[0];
              if (!item) {
                core.info(`Issue #${issueNumber} is not in project, skipping.`);
                continue;
              }

              await github.graphql(
                `mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $project,
                      itemId: $item,
                      fieldId: $field,
                      value: { singleSelectOptionId: $option }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }`,
                {
                  project: process.env.PROJECT_ID,
                  item: item.id,
                  field: process.env.STATUS_FIELD_ID,
                  option: optionId
                }
              );

              core.info(`Updated issue #${issueNumber} project status.`);
            }
